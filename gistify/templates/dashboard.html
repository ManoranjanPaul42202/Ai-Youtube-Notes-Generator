{% extends 'template.html' %}
{% block content %}
<div class="container mt-4">
    <!-- YouTube Video Preview -->
    <div class="video-preview mb-3 text-center">
        {% if video_id %}
        <iframe id="yt-player" width="560" height="315" src="https://www.youtube.com/embed/{{ video_id }}?enablejsapi=1"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
        </iframe>
        {% else %}
        <p>Invalid YouTube link.</p>
        {% endif %}
    </div>

    <!-- Transcription Loader -->
    <div id="transcription-container" class="text-center">
        <p id="loading-text">Transcription in progress... Please wait.</p>
        <div id="spinner" class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Full Transcription -->
    <div id="full-transcription" style="display:none; white-space: pre-wrap;" class="mt-3 border p-3 rounded bg-light">
    </div>

    <!-- Segment Timestamps -->
    <div id="transcription-segments" style="display:none;" class="mt-3"></div>
</div>

<script>
    // Format seconds → mm:ss
    function formatTime(seconds) {
        const minutes = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60).toString().padStart(2, '0');
        return `${minutes}:${secs}`;
    }

    // Render segments as clickable timestamps
    function renderSegments(segments, videoId) {
        const container = document.getElementById("transcription-segments");
        container.innerHTML = "<h5>Segments:</h5>";
        segments.forEach(seg => {
            const timeLink = document.createElement("a");
            timeLink.href = "#";
            timeLink.innerText = `[${formatTime(seg.start)}] `;
            timeLink.classList.add("me-2", "fw-bold", "text-primary");
            timeLink.addEventListener("click", (e) => {
                e.preventDefault();
                const player = document.getElementById("yt-player");
                player.src = `https://www.youtube.com/embed/${videoId}?start=${Math.floor(seg.start)}&autoplay=1&enablejsapi=1`;
            });

            const textSpan = document.createElement("span");
            textSpan.innerText = seg.text;

            const div = document.createElement("div");
            div.appendChild(timeLink);
            div.appendChild(textSpan);

            container.appendChild(div);
        });
        container.style.display = "block";
    }

    window.addEventListener('DOMContentLoaded', () => {
        fetch(`/get_transcription?link={{ link }}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById('loading-text').style.display = 'none';
                document.getElementById('spinner').style.display = 'none';

                // Full transcription
                const fullTransDiv = document.getElementById("full-transcription");
                fullTransDiv.style.display = "block";
                if (data.error) {
                    fullTransDiv.innerText = data.error;
                    fullTransDiv.classList.add('text-danger');
                } else {
                    fullTransDiv.innerText = data.transcription || "No transcription found.";
                }

                // Segments
                if (data.segments && data.segments.length > 0) {
                    renderSegments(data.segments, "{{ video_id }}");
                }
            })
            .catch(err => {
                document.getElementById('loading-text').style.display = 'none';
                document.getElementById('spinner').style.display = 'none';
                const fullTransDiv = document.getElementById("full-transcription");
                fullTransDiv.style.display = "block";
                fullTransDiv.innerText = "⚠️ Error fetching transcription.";
                fullTransDiv.classList.add('text-danger');
                console.error(err);
            });
    });
</script>
{% endblock %}
